<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="40%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </radialGradient>
    <linearGradient id="topline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(167,139,250,0.7)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Stars -->
  <g opacity="0.5">
    <circle cx="80"  cy="60"  r="1"   fill="white" opacity="0.6"/>
    <circle cx="200" cy="30"  r="1.5" fill="white" opacity="0.4"/>
    <circle cx="350" cy="80"  r="1"   fill="white" opacity="0.7"/>
    <circle cx="500" cy="20"  r="1"   fill="white" opacity="0.5"/>
    <circle cx="700" cy="50"  r="1.5" fill="white" opacity="0.4"/>
    <circle cx="900" cy="35"  r="1"   fill="white" opacity="0.6"/>
    <circle cx="1050" cy="70" r="1"   fill="white" opacity="0.5"/>
    <circle cx="1150" cy="25" r="1.5" fill="white" opacity="0.4"/>
    <circle cx="150" cy="550" r="1"   fill="white" opacity="0.3"/>
    <circle cx="450" cy="580" r="1.5" fill="white" opacity="0.3"/>
    <circle cx="750" cy="560" r="1"   fill="white" opacity="0.4"/>
    <circle cx="1050" cy="590" r="1"  fill="white" opacity="0.3"/>
  </g>

  <!-- Frame -->
  <rect x="30" y="30" width="1140" height="570" rx="12"
    fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  <line x1="30" y1="31" x2="1170" y2="31" stroke="url(#topline)" stroke-width="1.5"/>

  <!-- NASA logo -->
  <circle cx="100" cy="110" r="40" fill="#0b3d91" stroke="#fc3d21" stroke-width="2"/>
  <text x="100" y="117" text-anchor="middle" font-size="14" font-weight="bold"
    font-family="Arial,sans-serif" fill="white" letter-spacing="1">NASA</text>
  <ellipse cx="100" cy="110" rx="37" ry="12" fill="none" stroke="#fc3d21" stroke-width="1.5"
    transform="rotate(-28 100 110)" opacity="0.85"/>

  <!-- Title -->
  <text x="165" y="90" font-size="15" font-weight="700"
    font-family="Arial,sans-serif" fill="rgba(167,139,250,0.6)" letter-spacing="5">
    PROGRAM ARTEMIS
  </text>
  <text x="165" y="130" font-size="38" font-weight="900"
    font-family="Arial,sans-serif" fill="white" letter-spacing="2">
    MISSION CONTROL
  </text>

  <!-- Mission badges -->
  <!-- Artemis I -->
  <rect x="165" y="148" width="88" height="22" rx="4"
    fill="rgba(251,146,60,0.1)" stroke="rgba(251,146,60,0.4)" stroke-width="1"/>
  <text x="185" y="163" font-size="11" font-family="Arial,sans-serif"
    fill="#fb923c" font-weight="700" letter-spacing="1">I  HIST</text>

  <!-- Artemis II -->
  <rect x="263" y="148" width="98" height="22" rx="4"
    fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
  <text x="280" y="163" font-size="11" font-family="Arial,sans-serif"
    fill="#a78bfa" font-weight="700" letter-spacing="1">II  HIST</text>

  <!-- Artemis III -->
  <rect x="371" y="148" width="108" height="22" rx="4"
    fill="rgba(131,176,181,0.1)" stroke="rgba(131,176,181,0.4)" stroke-width="1"/>
  <circle cx="385" cy="159" r="4" fill="#83b0b5" opacity="0.8"/>
  <text x="395" y="163" font-size="11" font-family="Arial,sans-serif"
    fill="#83b0b5" font-weight="700" letter-spacing="1">III  PRE</text>

  <!-- Tagline -->
  <text x="165" y="205" font-size="16" font-family="Arial,sans-serif"
    fill="rgba(167,139,250,0.45)" letter-spacing="1">
    Telemetría · Hardware Tracker · Costos · Polo Sur Lunar · NASA TV
  </text>

  <!-- Trajectory -->
  <g transform="translate(600, 370)">
    <circle cx="-240" cy="0" r="32" fill="rgba(0,80,200,0.18)" stroke="rgba(0,140,255,0.45)" stroke-width="1.5"/>
    <text x="-240" y="46" text-anchor="middle" font-size="11" fill="rgba(100,160,255,0.65)" font-family="Arial,sans-serif">TIERRA</text>
    <circle cx="240" cy="0" r="26" fill="rgba(140,150,170,0.12)" stroke="rgba(160,165,190,0.38)" stroke-width="1.5"/>
    <text x="240" y="40" text-anchor="middle" font-size="11" fill="rgba(160,165,190,0.65)" font-family="Arial,sans-serif">LUNA</text>
    <path d="M -208 0 Q 0 -110 208 0" fill="none" stroke="rgba(167,139,250,0.2)" stroke-width="1.5" stroke-dasharray="8 5"/>
    <path d="M -208 0 Q 0 -110 45 -80" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
    <path d="M 45 -80 Q 0 -110 208 0" fill="none" stroke="rgba(167,139,250,0.4)" stroke-width="1.5" stroke-dasharray="5 4"/>
    <circle cx="45" cy="-80" r="9" fill="rgba(167,139,250,0.18)" stroke="#a78bfa" stroke-width="2"/>
    <text x="60" y="-86" font-size="11" fill="#a78bfa" font-family="Arial,sans-serif" font-weight="bold">ORION</text>
    <line x1="-208" y1="18" x2="208" y2="18" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="0" y="32" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.25)" font-family="Arial,sans-serif">384,400 km</text>
  </g>

  <!-- Data panels bottom -->
  <rect x="60"  y="530" width="175" height="52" rx="5" fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.14)" stroke-width="1"/>
  <text x="75"  y="551" font-size="9" fill="rgba(167,139,250,0.55)" font-family="Arial,sans-serif" letter-spacing="2">VELOCIDAD</text>
  <text x="75"  y="572" font-size="19" font-weight="bold" font-family="'Courier New',monospace" fill="#a78bfa">1.04 km/s</text>

  <rect x="248" y="530" width="195" height="52" rx="5" fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.14)" stroke-width="1"/>
  <text x="263" y="551" font-size="9" fill="rgba(167,139,250,0.55)" font-family="Arial,sans-serif" letter-spacing="2">DIST. TIERRA</text>
  <text x="263" y="572" font-size="19" font-weight="bold" font-family="'Courier New',monospace" fill="#c4b5fd">333,335 km</text>

  <rect x="458" y="530" width="185" height="52" rx="5" fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.14)" stroke-width="1"/>
  <text x="473" y="551" font-size="9" fill="rgba(167,139,250,0.55)" font-family="Arial,sans-serif" letter-spacing="2">DIST. LUNA</text>
  <text x="473" y="572" font-size="19" font-weight="bold" font-family="'Courier New',monospace" fill="white">57,465 km</text>

  <rect x="658" y="530" width="185" height="52" rx="5" fill="rgba(52,211,153,0.05)" stroke="rgba(52,211,153,0.14)" stroke-width="1"/>
  <text x="673" y="551" font-size="9" fill="rgba(52,211,153,0.55)" font-family="Arial,sans-serif" letter-spacing="2">STATUS</text>
  <text x="673" y="572" font-size="19" font-weight="bold" font-family="'Courier New',monospace" fill="#34d399">NOMINAL</text>

  <!-- Author -->
  <text x="1140" y="580" text-anchor="end" font-size="12"
    font-family="Arial,sans-serif" fill="rgba(167,139,250,0.35)" letter-spacing="2">
    BY PHIREQUIEM
  </text>
</svg>
